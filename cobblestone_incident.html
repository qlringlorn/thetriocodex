    background-size: cover;
    background-position: center;
    filter: brightness(0.45) sepia(0.3);
    transition: filter 0.8s ease;
  }

  #vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* PORTRAITS */
  #portraits {
    position: absolute;
    bottom: 160px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 40px;
    z-index: 2;
    pointer-events: none;
  }

  .portrait-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.5s ease;
  }

  .portrait-wrap.inactive {
    filter: brightness(0.35) saturate(0.3);
    transform: scale(0.93);
  }

  .portrait-wrap.active {
    filter: brightness(1) saturate(1.1);
    transform: scale(1);
  }

  .portrait-img {
    width: 130px;
    height: 150px;
    object-fit: cover;
    object-position: top center;
    border-radius: 4px 4px 0 0;
    border: 1px solid rgba(200,160,80,0.4);
    border-bottom: none;
  }

  .portrait-nameplate {
    font-family: 'IM Fell English SC', serif;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 12px;
    border: 1px solid;
    border-radius: 2px;
    text-align: center;
    width: 130px;
  }

  #p-mordecai .portrait-nameplate {
    color: #c8a050;
    border-color: rgba(200,160,80,0.5);
    background: rgba(20,15,5,0.85);
  }
  #p-oshael .portrait-nameplate {
    color: #d4b060;
    border-color: rgba(180,140,60,0.5);
    background: rgba(20,15,5,0.85);
  }
  #p-wrothek .portrait-nameplate {
    color: #b87840;
    border-color: rgba(160,100,40,0.5);
    background: rgba(20,15,5,0.85);
  }

  /* DIALOGUE BOX */
  #dialogue-box {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 155px;
    background: linear-gradient(to bottom, rgba(8,6,3,0.93), rgba(5,4,2,0.98));
    border-top: 1px solid rgba(180,140,60,0.4);
    z-index: 10;
    padding: 16px 28px 16px 28px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    cursor: pointer;
  }

  #speaker-name {
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    letter-spacing: 3px;
    color: #c8a050;
    min-height: 18px;
    border-bottom: 1px solid rgba(200,160,80,0.2);
    padding-bottom: 6px;
    text-shadow: 0 0 12px rgba(200,160,80,0.4);
    transition: color 0.3s;
  }

  #dialogue-text {
    font-size: 17px;
    line-height: 1.65;
    color: #e8dcc8;
    flex: 1;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    font-style: normal;
  }

  #dialogue-text.narration {
    font-style: italic;
    color: #ddd0b0;
    font-size: 16px;
  }

  /* progress */
  #progress {
    position: absolute;
    bottom: 8px;
    right: 28px;
    font-family: 'IM Fell English SC', serif;
    font-size: 10px;
    color: rgba(180,140,60,0.4);
    letter-spacing: 1px;
  }

  #continue-arrow {
    position: absolute;
    bottom: 12px;
    right: 50px;
    color: rgba(200,160,80,0.6);
    font-size: 14px;
    animation: pulse 1.4s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* TITLE CARD */
  #title-card {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    cursor: pointer;
    transition: opacity 0.6s;
  }

  #title-card h1 {
    font-family: 'IM Fell English SC', serif;
    font-size: 28px;
    letter-spacing: 6px;
    color: #c8a050;
    text-shadow: 0 0 30px rgba(200,160,80,0.5);
  }

  #title-card p {
    font-size: 13px;
    color: rgba(200,180,140,0.6);
    font-style: italic;
    letter-spacing: 2px;
  }

  #title-card .click-hint {
    margin-top: 24px;
    font-size: 11px;
    color: rgba(200,160,80,0.4);
    letter-spacing: 3px;
    animation: pulse 2s infinite;
  }

  .ornament {
    color: rgba(200,160,80,0.4);
    letter-spacing: 8px;
    font-size: 16px;
  }

  /* END CARD */
  #end-card {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 20;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
  }
  #end-card.visible {
    display: flex;
  }
  #end-card h2 {
    font-family: 'IM Fell English SC', serif;
    color: #c8a050;
    letter-spacing: 4px;
    font-size: 20px;
  }
  #replay-btn {
    font-family: 'IM Fell English SC', serif;
    background: transparent;
    border: 1px solid rgba(200,160,80,0.5);
    color: #c8a050;
    padding: 8px 24px;
    letter-spacing: 2px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.3s;
  }
  #replay-btn:hover {
    background: rgba(200,160,80,0.1);
    border-color: rgba(200,160,80,0.8);
  }
</style>
</head>

    <div id="speaker-name"></div>
    <div id="dialogue-text"></div>
    <div id="progress"></div>
    <div id="continue-arrow">▼</div>
  </div>

  <div id="title-card">
    <div class="ornament">✦ ✦ ✦</div>
    <h1>The Cobblestone Incident</h1>
    <p>Eastborough Workshop — Evening</p>
    <div class="ornament">✦ ✦ ✦</div>
    <div class="click-hint">[ Click to Begin ]</div>
  </div>

  <div id="end-card">
    <div class="ornament">✦ ✦ ✦</div>
    <h2>End of Scene</h2>
    <button id="replay-btn" onclick="restart()">[ Read Again ]</button>
  </div>
</div>

<script>
const MORDECAI = 'mordecai';
const OSHAEL = 'oshael';
const WROTHEK = 'wrothek';
const NARRATION = null;

const script = [
  [NARRATION, "The workshop smelled of iron and old smoke. Oshael sat in her corner with the khopesh across her knees, passing a cloth along the blade in slow, even strokes. She did not look up when Mordecai came in."],
  [NARRATION, "He set the scatter-gun on the bench. He stepped back. He put his hands in his pockets."],
  [WROTHEK, "What did you jam it with."],
  [MORDECAI, "It was available and the situation was time-sensitive."],
  [WROTHEK, "What did you jam it with."],
  [MORDECAI, "My belt buckle."],
  [NARRATION, "Wrothek put the caliper down. He turned the scatter-gun so the firing pin faced Mordecai. The firing pin was bent."],
  [WROTHEK, "Look at that."],
  [NARRATION, "Mordecai looked at it."],
  [WROTHEK, "Keep looking."],
  [NARRATION, "Mordecai kept looking. A cart went by outside on the cobbles. The iron wheels rang against the stone and faded into the street noise of Eastborough."],
  [WROTHEK, "I want you to understand. I made that. I made that well. And now it looks like that."],
  [MORDECAI, "The circumstances were genuinely unusual."],
  [WROTHEK, "Five days."],
  [MORDECAI, "Wrothek—"],
  [WROTHEK, "Five days and you tell me what you used to unjam it."],
  [MORDECAI, "That's not—"],
  [WROTHEK, "Six days."],
  [NARRATION, "Mordecai closed his mouth."],
  [OSHAEL, "He used a cobblestone."],
  [NARRATION, "Wrothek turned to look at her. Then he turned to look at Mordecai. Mordecai had the expression of a man composing several sentences at once and finding none of them satisfactory."],
  [MORDECAI, "It was on the ground. It was right there."],
  [WROTHEK, "You hit my scatter-gun with a cobblestone."],
  [MORDECAI, "I hit the mechanism specifically. It was a precise application of—"],
  [WROTHEK, "A rock."],
  [MORDECAI, "Force."],
  [NARRATION, "Wrothek wrote something in the journal. It took a while. He wrote more than he usually wrote. He closed the journal."],
  [OSHAEL, "To be fair — the man chasing us did stop. Eventually."],
  [MORDECAI, "Because I fired it. Which required getting it working again, which required the cobblestone, which proves my point."],
  [OSHAEL, "Your point."],
  [MORDECAI, "That it worked."],
  [OSHAEL, "He stopped because he was laughing."],
  [NARRATION, "The workshop was quiet."],
  [MORDECAI, "That is not an accurate characterization of what—"],
  [OSHAEL, "He was pointing also. At the cobblestone. While laughing."],
  [NARRATION, "Wrothek took the scatter-gun from the bench and walked to the back of the workshop without another word. Through the quiet, they heard the heavy clunk of the scatter-gun being set down. Then the sharp ring of a hammer being picked up. And then the sound of the hammer being set down again, very, very deliberately."],
  [MORDECAI, "You could have not mentioned the laughing."],
  [OSHAEL, "Yes. I could have."],
];

let current = 0;

const speakerColors = {
  [MORDECAI]: '#c8a050',
  [OSHAEL]: '#d4b060',
  [WROTHEK]: '#b87840',
};

function setActive(speaker) {
  ['mordecai','oshael','wrothek'].forEach(id => {
    const el = document.getElementById('p-' + id);
    if (speaker === id) {
      el.classList.remove('inactive');
      el.classList.add('active');
    } else {
      el.classList.remove('active');
      el.classList.add('inactive');
    }
  });
}

function advance() {
  if (current >= script.length) {
    document.getElementById('end-card').classList.add('visible');
    return;
  }
  const [speaker, text] = script[current];
  const nameEl = document.getElementById('speaker-name');
  const textEl = document.getElementById('dialogue-text');
  const progEl = document.getElementById('progress');

  if (speaker === NARRATION) {
    nameEl.textContent = '';
    nameEl.style.color = 'transparent';
    textEl.className = 'narration';
    setActive(null);
  } else {
    const names = { [MORDECAI]: 'Mordecai Aschenfeld', [OSHAEL]: 'Oshael', [WROTHEK]: 'Wrothek' };
    nameEl.textContent = names[speaker];
    nameEl.style.color = speakerColors[speaker];
    textEl.className = '';
    setActive(speaker);
  }

  textEl.textContent = text;
  progEl.textContent = (current + 1) + ' / ' + script.length;
  current++;
}

function restart() {
  current = 0;
  document.getElementById('end-card').classList.remove('visible');
  setActive(null);
  advance();
}

// Title card click
document.getElementById('title-card').addEventListener('click', function() {
  this.style.opacity = '0';
  this.style.pointerEvents = 'none';
  setTimeout(() => { this.style.display = 'none'; advance(); }, 600);
});

document.getElementById('dialogue-box').addEventListener('click', advance);

// keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowRight') {
    if (document.getElementById('title-card').style.display !== 'none') return;
    advance();
  }
});
</script>
